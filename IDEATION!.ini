  Q. Final Recommendation

  For Phase 1, do not position this as “insurance for gig workers” in general.

  Position it as:

  A weekly parametric income-protection product for Delhi NCR food-delivery riders that automatically pays for lost lunch/dinner earning windows
  when severe heat, AQI, or rain disrupt safe delivery work.

  That direction is the strongest because it is:

  - fully aligned with the DEVTrails brief
  - easy for judges to understand
  - realistic to price weekly
  - grounded in measurable signals
  - strong on AI without being fake
  - cleanly demoable in 2 minutes
  - narrow enough to execute well under hackathon pressure

