  E. Research-Backed Insights

  1. Parametric Insurance Fundamentals

  Parametric (or index-based) insurance has been successfully deployed in agriculture (crop insurance triggered by rainfall indices) and natural
   catastrophe markets. The World Bank and Swiss Re have published extensively on this model. The key insight: parametric insurance works best
  when the trigger is objectively measurable, publicly verifiable, and strongly correlated with the actual loss.

  Application to our product: Weather data (temperature, rainfall, AQI) is objectively measurable via public APIs. The correlation between
  extreme weather and food delivery income loss is direct — platforms like Zomato literally show "delivery delayed due to rain" and reduce order
   allocation in affected zones.

  2. Indian Gig Worker Income Patterns

  Research from the Fairwork India project and IFAT (Indian Federation of App-based Transport Workers) shows:
  - Average food delivery worker earns ₹15,000-25,000/month
  - Earnings are highly variable — a single bad weather week can cost ₹3,000-5,000
  - Workers have almost zero savings buffer — 60%+ live paycheck to paycheck
  - Weekly pay cycles are standard across Zomato/Swiggy

  Application: This validates weekly pricing (₹50-150/week is affordable and aligns with their cash flow). It also means even small payouts
  (₹500-1500) are meaningful protection.

  3. Weather Impact on Food Delivery

  Studies on food delivery platforms (including analysis from Zomato's own blog posts and news reports) show:
  - Heavy rain reduces order fulfillment by 30-50% in affected zones
  - Extreme heat (>43°C) causes significant rider drop-off
  - AQI above 300 (Delhi winters) leads to government advisories against outdoor work
  - Mumbai monsoon flooding causes complete delivery shutdowns in low-lying areas

  Application: These give us concrete, defensible thresholds for parametric triggers.

  4. Fraud in Parametric Insurance

  The primary fraud vectors in parametric insurance (from industry literature):
  - Moral hazard — worker claims they were going to work but weren't (solution: require active status on delivery platform)
  - Location spoofing — fake GPS to appear in disrupted zone (solution: historical location pattern matching)
  - Duplicate claims — same event, multiple policies (solution: one policy per worker per zone)
  - Collusion — multiple workers coordinate false patterns (solution: anomaly detection across clusters)

  Application: These directly inform our fraud detection module design.

  5. Relevant Technical References

  - OpenWeatherMap API — provides real-time and forecast weather data with free tier sufficient for prototype. Supports lat/long queries, which
  maps directly to delivery zones.
  - AQICN.org API — real-time AQI data for Indian cities. Free tier available.
  - IMD (India Meteorological Department) — publishes flood and severe weather alerts. Can be scraped or mocked.
  - Razorpay Test Mode / UPI Sandbox — acceptable for payment simulation per the problem statement.

  6. Existing Parametric Insurance Platforms (Reference Architecture)

  - Lemonade — AI-powered insurance with instant claim processing. Relevant for UX inspiration (simple onboarding, chatbot-driven).
  - Arbol — parametric weather insurance for agriculture. Their trigger mechanism (weather index crossing threshold → auto payout) is exactly
  what we need to adapt.
  - Etherisc — decentralized parametric insurance. Their flight delay product auto-triggers on verifiable data — same concept, different domain.
  - Rainfall Index Insurance (PMFBY model in India) — government crop insurance triggered by rainfall deviation. Proves the parametric model
  works in Indian regulatory context.

  Synthesis: The architecture pattern is consistent — data feed → threshold engine → validation → payout. We adapt this for hyperlocal food
  delivery zones.

