  F. Recommended Parametric Trigger Strategy

  Primary Triggers (Must implement)

  ┌──────────────────────┬────────────────────┬───────────────────────────────────┬────────────────────────────┐
  │       Trigger        │    Data Source     │      Threshold (Indicative)       │        Payout Logic        │
  ├──────────────────────┼────────────────────┼───────────────────────────────────┼────────────────────────────┤
  │ Heavy Rainfall       │ OpenWeatherMap API │ >30mm/hr or >100mm/day            │ Full shift compensation    │
  ├──────────────────────┼────────────────────┼───────────────────────────────────┼────────────────────────────┤
  │ Extreme Heat         │ OpenWeatherMap API │ >43°C sustained for 4+ hours      │ Partial shift (peak hours) │
  ├──────────────────────┼────────────────────┼───────────────────────────────────┼────────────────────────────┤
  │ Severe Air Pollution │ AQICN API          │ AQI > 350                         │ Full shift compensation    │
  ├──────────────────────┼────────────────────┼───────────────────────────────────┼────────────────────────────┤
  │ Flooding             │ IMD alerts / mock  │ Government flood warning for zone │ Full day compensation      │
  └──────────────────────┴────────────────────┴───────────────────────────────────┴────────────────────────────┘

  Secondary Triggers (Good to have, Phase 2+)

  ┌─────────────────┬────────────────────────────────────────────┬────────────────────────────────┐
  │     Trigger     │                Data Source                 │           Threshold            │
  ├─────────────────┼────────────────────────────────────────────┼────────────────────────────────┤
  │ Curfew / Bandh  │ News API / Government notifications (mock) │ Official announcement detected │
  ├─────────────────┼────────────────────────────────────────────┼────────────────────────────────┤
  │ Cyclone / Storm │ IMD cyclone tracker                        │ Warning level 3+ for zone      │
  ├─────────────────┼────────────────────────────────────────────┼────────────────────────────────┤
  │ Platform outage │ Simulated                                  │ App down for >2 hours in zone  │
  └─────────────────┴────────────────────────────────────────────┴────────────────────────────────┘

  Trigger Design Principles

  1. Objective — every trigger is based on a publicly verifiable data point, not self-reported
  2. Zone-specific — triggers fire per delivery zone (e.g., pincode or 5km radius), not city-wide
  3. Time-bound — triggers correspond to specific shift windows (morning/afternoon/evening)
  4. Graduated — severity determines payout percentage (partial vs full)

