  │         Layer         │                           What Judges Will Evaluate                            │
  ├───────────────────────┼────────────────────────────────────────────────────────────────────────────────┤
  │ Domain understanding  │ Do you understand how parametric insurance differs from traditional insurance? │
  ├───────────────────────┼────────────────────────────────────────────────────────────────────────────────┤
  │ Persona empathy       │ Do you know how a delivery worker earns, loses money, and thinks about risk?   │
  ├───────────────────────┼────────────────────────────────────────────────────────────────────────────────┤
