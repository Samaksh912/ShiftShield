  G. Weekly Premium Model Direction

  Premium Structure

  Weekly Premium = Base Rate × Zone Risk Multiplier × Season Factor × Coverage Tier

  Base Rate: ₹50-80/week (affordable for a worker earning ₹3,000-5,000/week)

  Zone Risk Multiplier:
  - Low risk zone (e.g., Bangalore Koramangala): 0.8x
  - Medium risk zone (e.g., Delhi Connaught Place): 1.0x
  - High risk zone (e.g., Mumbai Hindmata / Sion): 1.4x

  Determined by historical weather data for the zone over the past 2-3 years.

  Season Factor:
  - Monsoon months (Jun-Sep): 1.5x
  - Winter pollution months (Nov-Jan, Delhi/NCR): 1.3x
  - Summer heat months (Apr-Jun, North India): 1.2x
  - Normal months: 1.0x

  Coverage Tiers:

  ┌──────────┬─────────────────────────┬───────────────────┬─────────────────────┐
  │   Tier   │ Weekly Premium (approx) │ Max Weekly Payout │    Target Worker    │
  ├──────────┼─────────────────────────┼───────────────────┼─────────────────────┤
  │ Basic    │ ₹49-69                  │ ₹1,500            │ Part-time riders    │
  ├──────────┼─────────────────────────┼───────────────────┼─────────────────────┤
  │ Standard │ ₹79-109                 │ ₹3,000            │ Full-time riders    │
  ├──────────┼─────────────────────────┼───────────────────┼─────────────────────┤
  │ Premium  │ ₹129-169                │ ₹5,000            │ High-earning riders │
  └──────────┴─────────────────────────┴───────────────────┴─────────────────────┘

  Why this works financially

  - If a standard worker pays ₹89/week and claims once every 4-5 weeks on average (monsoon season), the insurer collects ~₹356-445 before a
  ₹3,000 payout
  - Loss ratio target: 60-70% (industry standard for microinsurance)
  - The AI component adjusts premiums dynamically — workers in historically safe zones pay less, creating a fair risk pool

  For Phase 1

  We don't need to build the full calculation engine. We need to document this model clearly in the README and show a simple prototype that
  demonstrates the concept (e.g., input zone + season → output weekly premium).

