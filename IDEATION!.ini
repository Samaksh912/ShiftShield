  Q. Final Recommendation

  Pick food delivery. Build small. Write a killer README. Nail the video.

  Phase 1 is not about code — it's about clarity of thought. The judges are evaluating whether you understand the problem deeply, have a
  credible technical plan, and can execute. The teams that win Phase 1 will be the ones with:

  1. A sharp, specific persona (not "gig workers" but "Zomato riders in flood-prone Mumbai zones")
  2. A clearly defined parametric model (specific triggers, specific thresholds, specific data sources)
  3. A believable weekly premium structure (with actual numbers)
  4. A working prototype (even if simple) that demonstrates the core concept
  5. A compelling 2-minute video that tells a story

  Do not over-engineer. Do not build what Phase 2 asks for. Do not try to impress with code volume. Impress with product thinking and execution
  clarity.

  Your deadline is March 20 EOD. You are already on March 7. You have 13 days. Spend 5 on the README and decisions, 5 on the prototype, and 3 on
   the video and polish. Submit on time — a 1-day delay costs DC 12,000, which is more than a 2-star rating earns you.




   IDEA 2

Build ShiftShield: a mobile-first web prototype for Delhi NCR food-delivery riders that sells weekly, shift-based parametric income protection
  for extreme heat, severe AQI, and heavy rain during lunch/dinner delivery windows. For Phase 1, the win condition is not a full product; it is
  a sharp, credible product definition with a clean README, a believable prototype scope, and a 2-minute story judges immediately understand.

  A. Expert Persona Chosen

  I’m taking the lens of a parametric insurance product strategist + hackathon CTO for last-mile platforms.

  That persona optimizes for:

  - insurable product design, not generic app ideas
  - fast Phase 1 execution, not overengineering
  - clear trigger logic, pricing logic, and fraud boundaries
  - judge perception: “this team understands both insurance and delivery operations”

  B. Problem Statement Decoded

  What the documents are actually asking you to build is:

  - a single-persona insurance product for delivery workers
  - that covers income loss only
  - using objective external triggers
  - with automatic claims/payout logic
  - priced on a weekly basis
  - with AI used in pricing/risk/fraud, not just added as a buzzword

  What it is not asking you to do:

  - build a general gig-worker super app
  - reimburse exact medical, vehicle, or accident costs
  - create traditional loss-adjusted claims
  - support all delivery segments at once
  - perfect underwriting in Phase 1

  Phase 1 is explicitly research, ideation, planning, README, repo direction, and a 2-minute strategy/prototype video, due March 20, 2026.
