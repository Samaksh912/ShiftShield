  ├───────────────────────┼────────────────────────────────────────────────────────────────────────────────┤
  │ Fraud awareness       │ Have you thought about how this system gets gamed?                             │
  └───────────────────────┴────────────────────────────────────────────────────────────────────────────────┘

  The critical distinction most teams will miss:
  Parametric insurance does NOT require a claim to be filed. It triggers automatically when a measurable parameter crosses a predefined
  threshold. The worker doesn't call anyone, upload photos, or fill forms. The system detects the event, validates it, and pays out. This is the
   core innovation — and it must be the centerpiece of your design.

  What is NOT being asked:
  - Health/life/accident insurance of any kind
  - Vehicle damage or repair coverage
  - Monthly or annual premium models
  - A generic insurance marketplace
  - Coverage for personal reasons (worker chooses not to work)

