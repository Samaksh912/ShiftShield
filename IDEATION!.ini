  B. Problem Statement Decoded

  The problem statement is not asking you to build a generic insurance app. It is asking something very specific. Let me break it apart.

  What it literally says:
  Build an AI-enabled parametric insurance platform for gig delivery workers that covers income loss from external disruptions, with automated
  detection and payouts, fraud prevention, and weekly pricing.

  What it actually tests:

