services:
  - type: web
    name: shiftshield-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_HOSTPORT
        fromService:
          type: pserv
          name: shiftshield-ml
          property: hostport
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: pserv
    name: shiftshield-ml
    runtime: python
    rootDir: backend/ml-service
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8001
      - key: PYTHON_VERSION
        value: 3.12.4
