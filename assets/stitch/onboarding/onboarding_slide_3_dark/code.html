<div class="absolute inset-0 bg-primary/10 blur-[100px] rounded-full"></div>
<!-- The Digital Wallet Layout -->

<div class="w-10 h-10 bg-primary/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="account_balance_wallet" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="bg-surface-container-highest px-3 py-1 rounded-full">
<span class="text-[10px] font-headline font-bold uppercase tracking-tighter text-on-surface-variant">Wallet Active</span>
</div>
</div>
<!-- Payout Visualization -->
<div class="space-y-4">
<div class="text-on-surface-variant text-xs uppercase tracking-widest font-headline">Available Balance</div>
<div class="font-headline text-5xl font-bold tracking-tighter text-on-surface flex items-baseline gap-1">
<span class="text-primary text-2xl">$</span>
<span>428.50</span>
</div>
</div>

<div class="grid grid-cols-2 gap-3 flex-grow">
<div class="bg-surface-container rounded-lg p-3 flex flex-col justify-between">
<span class="text-[10px] font-bold text-primary uppercase">Recent</span>
<span class="text-lg font-headline font-bold">+$124</span>
</div>
<div class="bg-surface-container rounded-lg p-3 flex flex-col justify-between">
<span class="text-[10px] font-bold text-on-surface-variant uppercase">Deliveries</span>
<span class="text-lg font-headline font-bold">12</span>
</div>
</div>
<!-- Transfer Action Overlay -->
<div class="mt-auto bg-primary-gradient rounded-lg p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 bg-on-primary-fixed/20 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed text-sm" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<span class="text-on-primary-fixed font-bold text-sm">Payout Sent</span>
</div>
<span class="material-symbols-outlined text-on-primary-fixed" data-icon="check_circle">check_circle</span>
</div>
</div>

<span class="material-symbols-outlined text-primary text-3xl" data-icon="payments">payments</span>
</div>

<span class="material-symbols-outlined text-secondary text-2xl" data-icon="credit_card">credit_card</span>

</div>
</div>

<h1 class="font-headline text-5xl font-extrabold tracking-tight leading-none text-on-surface">

            </p>
