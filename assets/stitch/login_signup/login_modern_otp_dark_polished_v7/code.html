<div class="flex items-center gap-3">

<div class="flex items-center justify-center bg-surface-container h-16 px-4 rounded-xl font-headline font-bold text-lg text-primary border border-white/5">

                    </div>

<input class="w-full h-16 bg-surface-container border-none focus:ring-2 focus:ring-primary/50 rounded-xl px-6 font-headline text-xl font-medium tracking-widest placeholder:text-outline/40 transition-all" maxlength="10" placeholder="98765 43210" type="tel"/>

</div>
